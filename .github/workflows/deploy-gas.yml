name: Deploy to Google Apps Script

on:
  push:
    branches:
      - master

jobs:
  deploy-gas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google Apps Script CLI (clasp)
        run: npm install -g @google/clasp

      - name: Re-format .clasprc.json for clasp
        env:
          CLASPRC_CONTENT: ${{ secrets.CLASPRC_JSON }}
        run: |
          # Create a temporary Node.js script to re-format the JSON
          cat <<'EOF' > reformat_clasp.js
          const fs = require('fs');
          const path = require('path');
          const originalClaspRcPath = path.join(process.env.HOME, '.clasprc.json_original');
          const newClaspRcPath = path.join(process.env.HOME, '.clasprc.json');
          
          try {
            // Write the secret to a temporary file to be read
            fs.writeFileSync(originalClaspRcPath, process.env.CLASPRC_CONTENT);

            const originalConfig = JSON.parse(fs.readFileSync(originalClaspRcPath, 'utf8'));
            const defaultToken = originalConfig.tokens.default;

            if (!defaultToken || !defaultToken.refresh_token || !defaultToken.client_id || !defaultToken.client_secret) {
              console.error('ERROR: Original .clasprc.json does not contain required keys in tokens.default.');
              process.exit(1);
            }

            // Construct the new, valid JSON structure that clasp expects
            const newConfig = {
              token: {
                refresh_token: defaultToken.refresh_token
              },
              oauth2ClientSettings: {
                clientId: defaultToken.client_id,
                clientSecret: defaultToken.client_secret
              },
              isLocalCreds: false
            };

            // Write the new, correctly formatted file that clasp will use for authentication
            fs.writeFileSync(newClaspRcPath, JSON.stringify(newConfig, null, 2));
            console.log('Successfully re-formatted .clasprc.json for clasp.');

          } catch (e) {
            console.error('ERROR: Failed during .clasprc.json re-formatting: ' + e.message);
            process.exit(1);
          }
          EOF

          # Execute the re-formatting script
          NODE_PATH=$(npm root -g) node reformat_clasp.js
        shell: bash

      - name: Pull files from Google Apps Script (Diagnostic)
        run: |
          cd "JET Promo"
          echo "--- Attempting to pull from GAS project ---"
          clasp pull
          echo "--- Listing pulled files ---"
          ls -R .
