<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JET Promo Intelligence">
  <defs>
    <linearGradient id="jetBlue" x1="0" y1="0" x2="1" y2="1">
